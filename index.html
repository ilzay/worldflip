<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WordFlip</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --accent: #5b6af5;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #f0f0f5;
    --muted: #8888a0;
    --card-bg: #1c1c22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Manrope', sans-serif; color: var(--text); }

  /* NAV */
  .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 4px; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'Manrope', sans-serif; transition: color .2s; }
  .nav-btn.active { color: var(--accent2); }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }

  /* PAGES */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .pages { flex: 1; overflow: hidden; position: relative; }
  .page { position: absolute; inset: 0; overflow-y: auto; padding: 16px; display: none; flex-direction: column; gap: 16px; }
  .page.active { display: flex; }

  /* HEADER */
  .page-header { display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .count-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); }

  /* ADD FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .form-row { display: flex; gap: 10px; }
  .inp { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'Manrope', sans-serif; outline: none; transition: border-color .2s; }
  .inp:focus { border-color: var(--accent); }
  .inp::placeholder { color: var(--muted); }
  .btn-add { background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; font-family: 'Manrope', sans-serif; padding: 12px 20px; cursor: pointer; white-space: nowrap; transition: opacity .2s, transform .1s; }
  .btn-add:active { transform: scale(.97); opacity: .85; }

  /* WORD LIST */
  .word-list { display: flex; flex-direction: column; gap: 8px; }
  .word-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; animation: fadeUp .25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .word-item .en { font-weight: 600; font-size: 15px; flex: 1; }
  .word-item .ru { font-size: 13px; color: var(--muted); flex: 1; text-align: right; }
  .word-item .del-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; transition: color .2s; flex-shrink: 0; }
  .word-item .del-btn:hover { color: var(--red); }
  .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; line-height: 1.8; }

  /* FLASHCARD PAGE */
  .flashcard-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; min-height: calc(100vh - 180px); }
  .progress-bar { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .4s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); width: 100%; }

  .card-scene { width: 100%; max-width: 340px; height: 200px; perspective: 900px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; padding: 24px; }
  .card-face.back { transform: rotateY(180deg); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-color: rgba(91,106,245,0.3); }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; }
  .card-word { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; text-align: center; }
  .card-face.back .card-word { color: var(--accent2); }
  .card-hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .card-tap-hint { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

  .card-actions { display: flex; gap: 12px; width: 100%; max-width: 340px; }
  .card-act { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 600; font-family: 'Manrope', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .2s; }
  .card-act.know { border-color: rgba(52,211,153,.3); color: var(--green); }
  .card-act.know:active { background: rgba(52,211,153,.1); transform: scale(.97); }
  .card-act.skip { border-color: rgba(248,113,113,.3); color: var(--red); }
  .card-act.skip:active { background: rgba(248,113,113,.1); transform: scale(.97); }

  .no-cards { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; line-height: 1.9; }

  /* QUIZ PAGE */
  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .quiz-word { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; text-align: center; }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .quiz-opt { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 10px; font-size: 14px; font-family: 'Manrope', sans-serif; color: var(--text); cursor: pointer; text-align: center; transition: all .2s; font-weight: 500; }
  .quiz-opt:active { transform: scale(.97); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(52,211,153,.12); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: rgba(248,113,113,.1); color: var(--red); }
  .quiz-feedback { font-size: 14px; font-weight: 600; min-height: 20px; }
  .quiz-feedback.good { color: var(--green); }
  .quiz-feedback.bad { color: var(--red); }
  .btn-next { background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; font-family: 'Manrope', sans-serif; padding: 14px 32px; cursor: pointer; transition: opacity .2s, transform .1s; }
  .btn-next:active { transform: scale(.97); opacity: .85; }
  .quiz-score { display: flex; gap: 16px; justify-content: center; }
  .score-pill { background: var(--surface2); border-radius: 20px; padding: 6px 16px; font-size: 13px; }
  .score-pill span { font-weight: 700; }
  .score-pill.g span { color: var(--green); }
  .score-pill.r span { color: var(--red); }

  /* REMINDER PAGE */
  .reminder-section { display: flex; flex-direction: column; gap: 10px; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 2px; }
  .reminder-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .rem-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rem-item:last-child { border-bottom: none; padding-bottom: 0; }
  .rem-word { font-weight: 600; font-size: 14px; }
  .rem-time { font-size: 12px; color: var(--accent2); }
  .rem-del { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; }
  .rem-del:hover { color: var(--red); }
  .btn-group { display: flex; gap: 8px; }
  .btn-remind { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 600; font-family: 'Manrope', sans-serif; padding: 10px 8px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-remind:active { background: var(--accent); border-color: var(--accent); transform: scale(.97); }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 13px; color: var(--text); opacity: 0; pointer-events: none; transition: all .3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* RESULT */
  .result-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px 0; text-align: center; }
  .result-emoji { font-size: 56px; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
  .result-sub { color: var(--muted); font-size: 14px; line-height: 1.7; }
  .result-stats { display: flex; gap: 20px; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .stat.g .stat-num { color: var(--green); }
  .stat.r .stat-num { color: var(--red); }

  .end-of-deck { text-align: center; padding: 40px 20px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="pages">

    <!-- PAGE: ADD -->
    <div class="page active" id="page-add">
      <div class="page-header">
        <div class="page-title">WordFlip</div>
        <div class="count-badge" id="total-count">0 слов</div>
      </div>
      <div class="form-card">
        <div class="form-row">
          <input class="inp" id="inp-en" placeholder="English word" autocomplete="off" spellcheck="false">
          <input class="inp" id="inp-ru" placeholder="Перевод" autocomplete="off">
        </div>
        <button class="btn-add" onclick="addWord()">+ Добавить</button>
      </div>
      <div class="word-list" id="word-list"></div>
    </div>

    <!-- PAGE: FLASHCARDS -->
    <div class="page" id="page-flash">
      <div class="page-header">
        <div class="page-title">Карточки</div>
        <div id="flash-counter" class="count-badge"></div>
      </div>
      <div id="flash-body"></div>
    </div>

    <!-- PAGE: QUIZ -->
    <div class="page" id="page-quiz">
      <div class="page-header">
        <div class="page-title">Тест</div>
        <div class="quiz-score">
          <div class="score-pill g">✓ <span id="q-correct">0</span></div>
          <div class="score-pill r">✗ <span id="q-wrong">0</span></div>
        </div>
      </div>
      <div id="quiz-body"></div>
    </div>

    <!-- PAGE: REMINDERS -->
    <div class="page" id="page-rem">
      <div class="page-header">
        <div class="page-title">Повторить</div>
      </div>
      <div id="rem-body"></div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="goPage('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
      Слова
    </button>
    <button class="nav-btn" onclick="goPage('flash',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M8 12h8M8 15h5" stroke-linecap="round"/></svg>
      Карточки
    </button>
    <button class="nav-btn" onclick="goPage('quiz',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3" stroke-linecap="round"/></svg>
      Тест
    </button>
    <button class="nav-btn" onclick="goPage('rem',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke-linecap="round"/></svg>
      Напомнить
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let words = JSON.parse(localStorage.getItem('wf_words') || '[]');
let reminders = JSON.parse(localStorage.getItem('wf_rem') || '[]');

// flashcard state
let flashIdx = 0;
let flashOrder = [];

// quiz state
let quizQ = null, quizAnswered = false, qCorrect = 0, qWrong = 0;
let quizQueue = [];

function save() {
  localStorage.setItem('wf_words', JSON.stringify(words));
  localStorage.setItem('wf_rem', JSON.stringify(reminders));
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'flash') initFlash();
  if (id === 'quiz') initQuiz();
  if (id === 'rem') renderReminders();
  renderList();
}

// ─── WORDS ───────────────────────────────────────────────────────────────────
function addWord() {
  const en = document.getElementById('inp-en').value.trim();
  const ru = document.getElementById('inp-ru').value.trim();
  if (!en || !ru) { showToast('Заполни оба поля'); return; }
  words.push({ id: Date.now(), en, ru });
  save();
  document.getElementById('inp-en').value = '';
  document.getElementById('inp-ru').value = '';
  renderList();
  showToast('✓ Добавлено: ' + en);
  if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('light');
}

function deleteWord(id) {
  words = words.filter(w => w.id !== id);
  reminders = reminders.filter(r => r.wordId !== id);
  save();
  renderList();
  showToast('Удалено');
}

function renderList() {
  const list = document.getElementById('word-list');
  const count = document.getElementById('total-count');
  count.textContent = words.length + ' ' + plural(words.length, 'слово','слова','слов');
  if (!words.length) {
    list.innerHTML = '<div class="empty-state">Здесь появятся твои слова.<br>Добавь первое слово выше ☝️</div>';
    return;
  }
  list.innerHTML = [...words].reverse().map(w => `
    <div class="word-item">
      <div class="en">${esc(w.en)}</div>
      <div class="ru">${esc(w.ru)}</div>
      <button class="del-btn" onclick="deleteWord(${w.id})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  `).join('');
}

// ─── FLASHCARDS ───────────────────────────────────────────────────────────────
function initFlash() {
  flashOrder = shuffle([...Array(words.length).keys()]);
  flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  const body = document.getElementById('flash-body');
  const counter = document.getElementById('flash-counter');

  if (!words.length) {
    counter.textContent = '';
    body.innerHTML = '<div class="no-cards">Сначала добавь слова<br>на вкладке «Слова» ➕</div>';
    return;
  }

  if (flashIdx >= flashOrder.length) {
    counter.textContent = '';
    body.innerHTML = `
      <div class="result-screen">
        <div class="result-emoji">🎉</div>
        <div class="result-title">Колода пройдена!</div>
        <div class="result-sub">Ты просмотрел все ${words.length} слов.</div>
        <button class="btn-next" onclick="initFlash()">Начать заново</button>
      </div>`;
    return;
  }

  const w = words[flashOrder[flashIdx]];
  const prog = Math.round((flashIdx / flashOrder.length) * 100);
  counter.textContent = (flashIdx + 1) + ' / ' + flashOrder.length;

  body.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center;">
      <div style="width:100%">
        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        <div class="progress-label"><span>Прогресс</span><span>${prog}%</span></div>
      </div>
      <div class="card-scene" onclick="flipCard(this)">
        <div class="card-inner" id="card-inner">
          <div class="card-face front">
            <div class="card-label">English</div>
            <div class="card-word">${esc(w.en)}</div>
            <div class="card-hint card-tap-hint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
              нажми чтобы перевернуть
            </div>
          </div>
          <div class="card-face back">
            <div class="card-label">Перевод</div>
            <div class="card-word">${esc(w.ru)}</div>
          </div>
        </div>
      </div>
      <div style="width:100%;text-align:center;font-size:12px;color:var(--muted);margin-top:-4px;">Знаешь это слово?</div>
      <div class="card-actions">
        <button class="card-act skip" onclick="flashNext(false)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          Не знаю
        </button>
        <button class="card-act know" onclick="flashNext(true)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
          Знаю
        </button>
      </div>
      <div class="btn-group" style="width:100%;max-width:340px;">
        <button class="btn-remind" onclick="addReminder(${w.id},'15')">⏰ +15 мин</button>
        <button class="btn-remind" onclick="addReminder(${w.id},'30')">⏰ +30 мин</button>
      </div>
    </div>`;
}

function flipCard(scene) {
  const inner = document.getElementById('card-inner');
  inner.classList.toggle('flipped');
  if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.selectionChanged();
}

function flashNext(knew) {
  if (knew) showToast('✓ Отлично!');
  flashIdx++;
  renderFlash();
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function initQuiz() {
  qCorrect = 0; qWrong = 0;
  quizQueue = shuffle([...words]);
  updateQuizScore();
  nextQuiz();
}

function nextQuiz() {
  const body = document.getElementById('quiz-body');
  if (!words.length) {
    body.innerHTML = '<div class="no-cards">Сначала добавь слова<br>на вкладке «Слова» ➕</div>';
    return;
  }
  if (!quizQueue.length) {
    body.innerHTML = `
      <div class="result-screen">
        <div class="result-emoji">${qCorrect > qWrong ? '🏆' : '📚'}</div>
        <div class="result-title">${qCorrect > qWrong ? 'Отличный результат!' : 'Нужно повторить!'}</div>
        <div class="result-stats">
          <div class="stat g"><div class="stat-num">${qCorrect}</div><div class="stat-lbl">Верно</div></div>
          <div class="stat r"><div class="stat-num">${qWrong}</div><div class="stat-lbl">Ошибок</div></div>
        </div>
        <button class="btn-next" onclick="initQuiz()">Пройти снова</button>
      </div>`;
    return;
  }
  quizAnswered = false;
  quizQ = quizQueue.pop();

  // pick 3 wrong options from other words
  const others = words.filter(w => w.id !== quizQ.id);
  const wrong = shuffle(others).slice(0, 3);
  const opts = shuffle([quizQ, ...wrong]);

  body.innerHTML = `
    <div class="quiz-card">
      <div style="font-size:12px;color:var(--muted);">Переведи слово:</div>
      <div class="quiz-word">${esc(quizQ.en)}</div>
      <div class="quiz-opts" id="quiz-opts">
        ${opts.map(o => `<button class="quiz-opt" onclick="checkAnswer(this,'${o.id}')">${esc(o.ru)}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="q-fb"></div>
      <button class="btn-next" id="q-next-btn" style="display:none" onclick="nextQuiz()">Следующее →</button>
    </div>`;
}

function checkAnswer(btn, idStr) {
  if (quizAnswered) return;
  quizAnswered = true;
  const correct = parseInt(idStr) === quizQ.id;
  const fb = document.getElementById('q-fb');
  document.querySelectorAll('.quiz-opt').forEach(b => b.style.pointerEvents = 'none');
  if (correct) {
    btn.classList.add('correct');
    fb.textContent = '✓ Правильно!';
    fb.className = 'quiz-feedback good';
    qCorrect++;
    if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
  } else {
    btn.classList.add('wrong');
    fb.textContent = '✗ Правильный: ' + quizQ.ru;
    fb.className = 'quiz-feedback bad';
    qWrong++;
    // highlight correct
    document.querySelectorAll('.quiz-opt').forEach(b => {
      if (parseInt(b.getAttribute('onclick').match(/\d+/)[0]) === quizQ.id) b.classList.add('correct');
    });
    if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('error');
  }
  updateQuizScore();
  document.getElementById('q-next-btn').style.display = 'block';
}

function updateQuizScore() {
  document.getElementById('q-correct').textContent = qCorrect;
  document.getElementById('q-wrong').textContent = qWrong;
}

// ─── REMINDERS ───────────────────────────────────────────────────────────────
function addReminder(wordId, mins) {
  const w = words.find(x => x.id === wordId);
  if (!w) return;
  const fireAt = Date.now() + parseInt(mins) * 60 * 1000;
  reminders = reminders.filter(r => r.wordId !== wordId);
  reminders.push({ wordId, en: w.en, ru: w.ru, fireAt, mins });
  save();
  showToast(`⏰ Напоминание через ${mins} мин`);
  if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('medium');
}

function renderReminders() {
  const body = document.getElementById('rem-body');
  const now = Date.now();
  const active = reminders.filter(r => r.fireAt > now).sort((a,b) => a.fireAt - b.fireAt);
  const fired = reminders.filter(r => r.fireAt <= now);

  if (!active.length && !fired.length) {
    body.innerHTML = `<div class="empty-state">Нет активных напоминаний.<br>Установи напоминание<br>на вкладке «Карточки» ⏰</div>`;
    return;
  }

  let html = '';

  if (fired.length) {
    html += `<div class="section-label">🔔 Пора повторить</div><div class="reminder-card">`;
    fired.forEach(r => {
      html += `<div class="rem-item">
        <div><div class="rem-word">${esc(r.en)}</div><div style="font-size:12px;color:var(--muted)">${esc(r.ru)}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="btn-group">
            <button class="btn-remind" style="padding:6px 10px;font-size:11px" onclick="addReminder(${r.wordId},'15')">+15м</button>
            <button class="btn-remind" style="padding:6px 10px;font-size:11px" onclick="addReminder(${r.wordId},'30')">+30м</button>
          </div>
          <button class="rem-del" onclick="deleteReminder(${r.wordId})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  if (active.length) {
    html += `<div class="section-label" style="margin-top:${fired.length?'16px':'0'}">⏳ Запланировано</div><div class="reminder-card">`;
    active.forEach(r => {
      const msLeft = r.fireAt - now;
      const mLeft = Math.ceil(msLeft / 60000);
      html += `<div class="rem-item">
        <div><div class="rem-word">${esc(r.en)}</div><div style="font-size:12px;color:var(--muted)">${esc(r.ru)}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="rem-time">через ${mLeft} мин</div>
          <button class="rem-del" onclick="deleteReminder(${r.wordId})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  body.innerHTML = html;
}

function deleteReminder(wordId) {
  reminders = reminders.filter(r => r.wordId !== wordId);
  save();
  renderReminders();
}

// check reminders every 30s
setInterval(() => {
  const now = Date.now();
  const fired = reminders.filter(r => r.fireAt <= now && !r.notified);
  fired.forEach(r => {
    r.notified = true;
    showToast('🔔 Повтори: ' + r.en);
    if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
  });
  if (fired.length) { save(); renderReminders(); }
}, 10000);

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function plural(n, f1, f2, f5) { n=Math.abs(n)%100; const n1=n%10; if(n>10&&n<20) return f5; if(n1>1&&n1<5) return f2; if(n1==1) return f1; return f5; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// seed some demo words if empty
if (!words.length) {
  words = [
    { id: 1, en: 'Resilience', ru: 'Устойчивость' },
    { id: 2, en: 'Ambiguous', ru: 'Неоднозначный' },
    { id: 3, en: 'Serendipity', ru: 'Случайная удача' },
  ];
  save();
}

renderList();
</script>
