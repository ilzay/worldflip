<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WordFlip — учи слова</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1410;
  --s1:#101d17;
  --s2:#16261e;
  --s3:#1d3126;
  --border:rgba(120,220,180,0.08);
  --border2:rgba(120,220,180,0.16);
  --acc:#2de0a5;
  --acc2:#7df0c8;
  --acc-dim:rgba(45,224,165,0.14);
  --gold:#ffd166;
  --red:#ff7b7b;
  --text:#e9f5ef;
  --muted:#7da393;
  --muted2:#48635a;
  --r:14px;
  --r2:20px;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);font-size:clamp(14px,3.8vw,16px)}

/* ── BG ── */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(45,224,165,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,224,165,.03) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse at 50% 0%,black 0%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at 50% 0%,black 0%,transparent 75%)}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;z-index:1}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:clamp(12px,3vw,20px) clamp(10px,3vw,16px) calc(var(--nav-h) + 20px);display:none;flex-direction:column;gap:clamp(10px,2.5vw,16px);scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.active{display:flex}

/* ── NAV ── */
.nav{display:flex;background:rgba(16,29,23,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom,0px));position:absolute;bottom:0;left:0;right:0;z-index:10;min-height:var(--nav-h)}
.nav-btn{flex:1 1 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;font-size:clamp(8px,2.4vw,10px);font-weight:600;color:var(--muted2);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:color .2s;min-width:0;overflow:hidden;white-space:nowrap}
.nav-btn svg{width:clamp(18px,5vw,21px);height:clamp(18px,5vw,21px);stroke-width:2;transition:all .2s}
.nav-btn.active{color:var(--acc)}
.nav-btn.active svg{filter:drop-shadow(0 0 8px rgba(45,224,165,.6))}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0}
.hdr-title{font-family:'Unbounded',sans-serif;font-size:clamp(17px,5vw,22px);font-weight:800;letter-spacing:-.02em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-title .dot{color:var(--acc)}
.badge{background:var(--s2);border:1px solid var(--border2);border-radius:30px;padding:4px 12px;font-size:clamp(10px,2.8vw,12px);font-weight:600;color:var(--acc2);white-space:nowrap;flex-shrink:0}

/* ── ADD FORM ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:clamp(12px,3.5vw,16px);display:flex;flex-direction:column;gap:10px;min-width:0}
.lbl{font-size:clamp(9px,2.4vw,10px);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-left:2px}
.inp{width:100%;background:var(--s3);border:1.5px solid transparent;border-radius:var(--r);padding:clamp(11px,3vw,14px) clamp(12px,3.5vw,16px);color:var(--text);font-size:clamp(15px,4vw,16px);font-family:'Inter',sans-serif;font-weight:600;outline:none;transition:all .2s;min-width:0}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim)}
.inp::placeholder{color:var(--muted2);font-weight:500}

/* suggestions */
.chips{display:flex;flex-wrap:wrap;gap:6px;min-width:0}
.chip{background:var(--s3);border:1.5px solid var(--border2);border-radius:30px;padding:clamp(6px,1.8vw,8px) clamp(11px,3.2vw,15px);font-size:clamp(12px,3.4vw,14px);font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.on{background:var(--acc-dim);border-color:var(--acc);color:var(--acc2)}
.t9{display:flex;align-items:center;background:var(--acc-dim);border:1.5px dashed rgba(45,224,165,.35);border-radius:var(--r);padding:clamp(7px,2vw,9px) clamp(11px,3vw,14px);cursor:pointer;width:100%;transition:background .15s;min-width:0;overflow:hidden}
.t9:active{background:rgba(45,224,165,.25)}
.t9 b{font-size:clamp(13px,3.6vw,15px);color:var(--text);font-weight:700;white-space:nowrap}
.t9 i{font-size:clamp(13px,3.6vw,15px);color:var(--acc);font-weight:700;font-style:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t9 .key{margin-left:auto;font-size:9px;color:var(--muted);background:var(--s3);border-radius:5px;padding:2px 6px;flex-shrink:0}
.hint{font-size:clamp(11px,3vw,13px);color:var(--muted2);padding:2px}

.sel{display:flex;align-items:center;gap:8px;background:var(--acc-dim);border:1px solid rgba(45,224,165,.3);border-radius:var(--r);padding:clamp(8px,2.4vw,11px) clamp(11px,3vw,14px);min-width:0}
.sel .s-lbl{font-size:clamp(10px,2.6vw,11px);color:var(--muted);flex-shrink:0}
.sel .s-val{font-weight:700;font-size:clamp(13px,3.6vw,15px);color:var(--acc2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel .s-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;flex-shrink:0}

.btn{background:var(--acc);border:none;border-radius:var(--r);color:#06140e;font-size:clamp(13px,3.8vw,15px);font-weight:700;font-family:'Inter',sans-serif;padding:clamp(12px,3.2vw,14px);cursor:pointer;width:100%;transition:all .15s;opacity:.35;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn.on{opacity:1;pointer-events:all}
.btn:active{transform:scale(.97)}
.btn-ghost{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:clamp(13px,3.6vw,15px);font-weight:700;font-family:'Inter',sans-serif;padding:clamp(11px,3vw,13px) clamp(18px,5vw,28px);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-ghost:active{transform:scale(.97);border-color:var(--acc)}

/* ── WORD LIST ── */
.wlist{display:flex;flex-direction:column;gap:7px;min-width:0}
.witem{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:clamp(10px,2.8vw,13px) clamp(10px,3vw,13px);display:flex;align-items:center;gap:clamp(6px,2vw,10px);animation:up .25s ease;min-width:0}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.w-n{font-size:clamp(9px,2.4vw,11px);font-weight:700;color:var(--muted2);min-width:16px;text-align:center;flex-shrink:0}
.w-en{font-weight:700;font-size:clamp(13px,3.6vw,15px);flex:1 1 40%;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w-ru{font-size:clamp(11px,3.2vw,13px);color:var(--muted);flex:1 1 40%;text-align:right;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w-x{background:none;border:none;cursor:pointer;color:var(--muted2);padding:4px;flex-shrink:0;transition:color .15s}
.w-x:active{color:var(--red)}
.empty{text-align:center;color:var(--muted);font-size:clamp(12px,3.4vw,14px);padding:48px 16px;line-height:2;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty .e-ico{font-size:clamp(32px,9vw,42px);opacity:.6}

/* ── FLASHCARDS ── */
.prog{width:100%;display:flex;flex-direction:column;gap:5px}
.prog-t{width:100%;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .4s ease}
.prog-m{display:flex;justify-content:space-between;font-size:clamp(9px,2.6vw,11px);font-weight:600;color:var(--muted)}

.scene{width:100%;height:clamp(170px,46vw,220px);perspective:1200px;cursor:pointer;user-select:none;-webkit-user-select:none}
.cin{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);will-change:transform}
.cin.fl{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.cf{position:absolute;inset:0;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:clamp(16px,5vw,28px);gap:8px;overflow:hidden;-webkit-transform:translateZ(0);transform:translateZ(0)}
.cf.f1{background:#13251c;border:1px solid var(--border2);z-index:2}
.cf.f2{background:#0e2018;border:1px solid rgba(45,224,165,.25);-webkit-transform:rotateY(180deg) translateZ(0);transform:rotateY(180deg) translateZ(0);z-index:1}
.c-chip{font-size:clamp(8px,2.2vw,10px);font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.c-word{font-family:'Unbounded',sans-serif;font-size:clamp(20px,6.5vw,30px);font-weight:600;text-align:center;line-height:1.25;word-break:break-word;max-width:100%}
.cf.f2 .c-word{color:var(--acc2)}
.c-tap{font-size:clamp(9px,2.6vw,11px);color:var(--muted2);display:flex;align-items:center;gap:4px}

.row2{display:flex;gap:8px;width:100%;min-width:0}
.act{flex:1 1 0;padding:clamp(11px,3.2vw,14px) 6px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--s1);font-size:clamp(11px,3.2vw,13px);font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;white-space:nowrap;min-width:0;overflow:hidden}
.act.ok{border-color:rgba(45,224,165,.3);color:var(--acc)}
.act.ok:active{background:var(--acc-dim);transform:scale(.96)}
.act.no{border-color:rgba(255,123,123,.3);color:var(--red)}
.act.no:active{background:rgba(255,123,123,.08);transform:scale(.96)}

/* ── QUIZ ── */
.q-hd{display:flex;gap:6px;flex-shrink:0}
.q-s{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:clamp(10px,2.8vw,12px);font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.q-s.g{color:var(--acc)}
.q-s.r{color:var(--red)}
.q-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:clamp(20px,6vw,30px) clamp(14px,4vw,20px);display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.q-sub{font-size:clamp(9px,2.4vw,11px);font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.q-word{font-family:'Unbounded',sans-serif;font-size:clamp(20px,7vw,32px);font-weight:600;text-align:center;line-height:1.2;word-break:break-word;max-width:100%}
.q-opts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;width:100%}
.q-o{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:clamp(11px,3.2vw,14px) clamp(6px,2vw,10px);font-size:clamp(12px,3.4vw,14px);font-family:'Inter',sans-serif;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;font-weight:600;line-height:1.35;word-break:break-word;min-width:0}
.q-o:active{transform:scale(.97)}
.q-o.c{border-color:var(--acc);background:var(--acc-dim);color:var(--acc)}
.q-o.w{border-color:var(--red);background:rgba(255,123,123,.08);color:var(--red)}
.q-fb{font-size:clamp(12px,3.4vw,14px);font-weight:700;min-height:20px;text-align:center;word-break:break-word}
.q-fb.g{color:var(--acc)}
.q-fb.r{color:var(--red)}

/* ── RESULT ── */
.res{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:36px 12px;text-align:center}
.res-e{font-size:clamp(44px,13vw,60px);animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.res-t{font-family:'Unbounded',sans-serif;font-size:clamp(17px,5vw,24px);font-weight:800}
.res-s{color:var(--muted);font-size:clamp(12px,3.4vw,14px);line-height:1.8}
.res-row{display:flex;gap:12px}
.res-st{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:clamp(10px,3vw,14px) clamp(14px,4.5vw,22px)}
.res-n{font-family:'Unbounded',sans-serif;font-size:clamp(20px,6vw,28px);font-weight:800}
.res-l{font-size:clamp(8px,2.2vw,10px);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.res-st.g .res-n{color:var(--acc)}
.res-st.r .res-n{color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(14px);background:rgba(22,38,30,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:30px;padding:10px 20px;font-size:clamp(11px,3.2vw,13px);font-weight:600;color:var(--text);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.2,.64,1);z-index:999;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 28px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.nocards{text-align:center;color:var(--muted);font-size:clamp(12px,3.4vw,14px);padding:44px 16px;line-height:2}
.center{display:flex;justify-content:center}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="app">
  <div class="pages">

    <!-- ADD -->
    <div class="page active" id="page-add">
      <div class="hdr">
        <div class="hdr-title">WordFlip<span class="dot">.</span></div>
        <div class="badge" id="cnt">0 слов</div>
      </div>
      <div class="card">
        <div>
          <div class="lbl">Слово</div>
          <input class="inp" id="in-en" placeholder="Напиши слово на английском" autocomplete="off" spellcheck="false" oninput="onInput(this.value)">
        </div>
        <div id="sug-box" style="display:none">
          <div class="lbl" style="margin-bottom:6px">Выбери перевод</div>
          <div class="chips" id="sug-chips"></div>
        </div>
        <div id="sel-box" style="display:none">
          <div class="sel">
            <span class="s-lbl">Перевод:</span>
            <span class="s-val" id="sel-val"></span>
            <button class="s-x" onclick="clearSel()">×</button>
          </div>
        </div>
        <button class="btn" id="btn-add" onclick="addWord()">Добавить</button>
      </div>
      <div class="wlist" id="wlist"></div>
    </div>

    <!-- FLASH -->
    <div class="page" id="page-flash">
      <div class="hdr">
        <div class="hdr-title">Карточки</div>
        <div class="badge" id="f-cnt"></div>
      </div>
      <div id="f-body"></div>
    </div>

    <!-- QUIZ -->
    <div class="page" id="page-quiz">
      <div class="hdr">
        <div class="hdr-title">Тест</div>
        <div class="q-hd">
          <div class="q-s g">✓ <span id="qc">0</span></div>
          <div class="q-s r">✗ <span id="qw">0</span></div>
        </div>
      </div>
      <div id="q-body"></div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="nav('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
      Слова
    </button>
    <button class="nav-btn" onclick="nav('flash',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M8 12h8" stroke-linecap="round"/></svg>
      Карточки
    </button>
    <button class="nav-btn" onclick="nav('quiz',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01" stroke-linecap="round"/></svg>
      Тест
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const DICT = {

function lookupWord(w) {
  const key = w.trim().toLowerCase();
  if (!key) return null;
  if (DICT[key]) return { translations: DICT[key], fullWord: key };
  const matches = Object.keys(DICT).filter(k => k.startsWith(key)).sort((a,b) => a.length - b.length);
  if (matches.length) return { translations: DICT[matches[0]], fullWord: matches[0] };
  return null;
}

// ── STATE + TELEGRAM CLOUD SYNC ──
let words = [];
let flashIdx = 0, flashOrder = [];
let quizQ = null, quizDone = false, qC = 0, qW = 0, quizQueue = [];
let selRu = '';
const TG = window.Telegram && window.Telegram.WebApp;
const CS = TG && TG.CloudStorage && TG.initDataUnsafe && TG.initDataUnsafe.user ? TG.CloudStorage : null;

// local fallback load
try { words = JSON.parse(localStorage.getItem('lx_words') || '[]'); } catch(e) { words = []; }

function save() {
  const w = JSON.stringify(words);
  localStorage.setItem('lx_words', w);
  if (CS) { try { CS.setItem('lx_words', w); } catch(e){} }
}

function loadCloud(cb) {
  if (!CS) { cb(); return; }
  try {
    CS.getItems(['lx_words'], (err, vals) => {
      if (!err && vals && vals.lx_words) {
        try {
          const cw = JSON.parse(vals.lx_words);
          if (Array.isArray(cw) && cw.length >= words.length) {
            words = cw; localStorage.setItem('lx_words', vals.lx_words);
          }
        } catch(e){}
      }
      cb();
    });
  } catch(e) { cb(); }
}

// ── NAV ──
function nav(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'flash') initFlash();
  if (id === 'quiz') initQuiz();
  renderList();
}

// ── INPUT + DICT ──
function onInput(val) {
  selRu = '';
  updSel(); updBtn();
  const box = document.getElementById('sug-box');
  const chips = document.getElementById('sug-chips');
  if (!val.trim()) { box.style.display = 'none'; return; }

  const res = lookupWord(val);
  if (res) {
    box.style.display = 'block';
    const typed = val.trim().toLowerCase();
    const t9 = (res.fullWord !== typed)
      ? '<div class="t9" onclick="applyT9(\'' + esc(res.fullWord) + '\')"><b>' + esc(val.trim()) + '</b><i>' + esc(res.fullWord.slice(typed.length)) + '</i><span class="key">tab</span></div>'
      : '';
    chips.innerHTML = t9 + res.translations.map(r =>
      '<div class="chip" onclick="pick(\'' + esc(r) + '\')">' + esc(r) + '</div>'
    ).join('');
  } else {
    box.style.display = 'block';
    chips.innerHTML = '<div class="hint">Нет в словаре — введи перевод сам:</div>' +
      '<input class="inp" id="in-ru" placeholder="Перевод на русском" autocomplete="off" style="margin-top:6px" oninput="onManual(this.value)">';
  }
}

function applyT9(fw) {
  const inp = document.getElementById('in-en');
  inp.value = fw.charAt(0).toUpperCase() + fw.slice(1);
  onInput(fw);
  haptic('light');
}

function onManual(v) { selRu = v.trim(); updBtn(); }

function pick(ru) {
  selRu = ru;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.textContent === ru));
  updSel(); updBtn();
  haptic('light');
}

function updSel() {
  const b = document.getElementById('sel-box');
  if (selRu) { b.style.display = 'block'; document.getElementById('sel-val').textContent = selRu; }
  else b.style.display = 'none';
}
function clearSel() {
  selRu = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  updSel(); updBtn();
}
function updBtn() {
  const en = document.getElementById('in-en').value.trim();
  document.getElementById('btn-add').classList.toggle('on', !!(en && selRu));
}

// ── WORDS ──
function addWord() {
  const en = document.getElementById('in-en').value.trim();
  if (!en || !selRu) { toast('Выбери перевод'); return; }
  words.push({ id: Date.now(), en, ru: selRu });
  save();
  document.getElementById('in-en').value = '';
  document.getElementById('sug-box').style.display = 'none';
  selRu = ''; updSel(); updBtn();
  renderList();
  toast('Добавлено: ' + en);
  haptic('light');
}

function delWord(id) {
  words = words.filter(w => w.id !== id);
  save(); renderList(); toast('Удалено');
}

function renderList() {
  const l = document.getElementById('wlist');
  document.getElementById('cnt').textContent = words.length + ' ' + plural(words.length,'слово','слова','слов');
  if (!words.length) {
    l.innerHTML = '<div class="empty"><div class="e-ico">📚</div>Пока пусто.<br>Добавь первое слово!</div>';
    return;
  }
  l.innerHTML = [...words].reverse().map((w, i) =>
    '<div class="witem">' +
      '<div class="w-n">' + (words.length - i) + '</div>' +
      '<div class="w-en">' + esc(w.en) + '</div>' +
      '<div class="w-ru">' + esc(w.ru) + '</div>' +
      '<button class="w-x" onclick="delWord(' + w.id + ')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>' +
    '</div>'
  ).join('');
}

// ── FLASHCARDS ──
function initFlash() {
  flashOrder = shuffle([...Array(words.length).keys()]);
  flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  const b = document.getElementById('f-body');
  const c = document.getElementById('f-cnt');
  if (!words.length) { c.textContent=''; b.innerHTML = '<div class="nocards">Сначала добавь слова<br>на вкладке «Слова»</div>'; return; }
  if (flashIdx >= flashOrder.length) {
    c.textContent='';
    b.innerHTML = '<div class="res"><div class="res-e">🌿</div><div class="res-t">Колода пройдена!</div>' +
      '<div class="res-s">Ты повторил все ' + words.length + ' ' + plural(words.length,'слово','слова','слов') + '</div>' +
      '<button class="btn-ghost" onclick="initFlash()">Ещё раз</button></div>';
    return;
  }
  const w = words[flashOrder[flashIdx]];
  const p = Math.round((flashIdx / flashOrder.length) * 100);
  c.textContent = (flashIdx+1) + ' / ' + flashOrder.length;
  b.innerHTML =
    '<div style="display:flex;flex-direction:column;gap:12px">' +
    '<div class="prog"><div class="prog-t"><div class="prog-f" style="width:' + p + '%"></div></div>' +
    '<div class="prog-m"><span>Прогресс</span><span>' + p + '%</span></div></div>' +
    '<div class="scene" onclick="flip()"><div class="cin" id="cin">' +
      '<div class="cf f1"><div class="c-chip">English</div><div class="c-word">' + esc(w.en) + '</div>' +
      '<div class="c-tap">нажми — увидишь перевод</div></div>' +
      '<div class="cf f2"><div class="c-chip">Перевод</div><div class="c-word">' + esc(w.ru) + '</div></div>' +
    '</div></div>' +
    '<div class="row2">' +
      '<button class="act no" onclick="fnext(false)">✗ Не знаю</button>' +
      '<button class="act ok" onclick="fnext(true)">✓ Знаю</button>' +
    '</div>' +
    '</div>';
}

function flip() {
  const c = document.getElementById('cin');
  if (c) { c.classList.toggle('fl'); haptic('sel'); }
}
function fnext(ok) { if (ok) toast('Отлично!'); flashIdx++; renderFlash(); }

// ── QUIZ ──
function initQuiz() {
  qC = 0; qW = 0;
  quizQueue = shuffle([...words]);
  updQ(); nextQ();
}

function nextQ() {
  const b = document.getElementById('q-body');
  if (!words.length) { b.innerHTML = '<div class="nocards">Сначала добавь слова</div>'; return; }
  if (words.length < 2) { b.innerHTML = '<div class="nocards">Нужно хотя бы 2 слова</div>'; return; }
  if (!quizQueue.length) {
    b.innerHTML = '<div class="res"><div class="res-e">' + (qC >= qW ? '🏆' : '📖') + '</div>' +
      '<div class="res-t">' + (qC >= qW ? 'Класс!' : 'Повтори ещё') + '</div>' +
      '<div class="res-row"><div class="res-st g"><div class="res-n">' + qC + '</div><div class="res-l">Верно</div></div>' +
      '<div class="res-st r"><div class="res-n">' + qW + '</div><div class="res-l">Ошибки</div></div></div>' +
      '<button class="btn-ghost" onclick="initQuiz()">Снова</button></div>';
    return;
  }
  quizDone = false;
  quizQ = quizQueue.pop();
  const others = words.filter(w => w.id !== quizQ.id);
  const opts = shuffle([quizQ, ...shuffle(others).slice(0, Math.min(3, others.length))]);
  b.innerHTML =
    '<div style="display:flex;flex-direction:column;gap:12px">' +
    '<div class="q-card"><div class="q-sub">Переведи</div><div class="q-word">' + esc(quizQ.en) + '</div></div>' +
    '<div class="q-opts">' + opts.map(o =>
      '<button class="q-o" onclick="checkQ(this,' + o.id + ')">' + esc(o.ru) + '</button>'
    ).join('') + '</div>' +
    '<div class="q-fb" id="q-fb"></div>' +
    '<div class="center"><button class="btn-ghost" id="q-n" style="display:none" onclick="nextQ()">Дальше →</button></div>' +
    '</div>';
}

function checkQ(btn, id) {
  if (quizDone) return;
  quizDone = true;
  const ok = id === quizQ.id;
  document.querySelectorAll('.q-o').forEach(b => b.style.pointerEvents = 'none');
  const fb = document.getElementById('q-fb');
  if (ok) { btn.classList.add('c'); fb.textContent = '✓ Верно!'; fb.className = 'q-fb g'; qC++; haptic('ok'); }
  else {
    btn.classList.add('w'); fb.textContent = '✗ Правильно: ' + quizQ.ru; fb.className = 'q-fb r'; qW++;
    document.querySelectorAll('.q-o').forEach(b => {
      const m = b.getAttribute('onclick').match(/\d+/);
      if (m && parseInt(m[0]) === quizQ.id) b.classList.add('c');
    });
    haptic('err');
  }
  updQ();
  document.getElementById('q-n').style.display = 'inline-block';
}

function updQ() {
  document.getElementById('qc').textContent = qC;
  document.getElementById('qw').textContent = qW;
}

// ── UTILS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}
function plural(n,a,b,c){n=Math.abs(n)%100;const d=n%10;if(n>10&&n<20)return c;if(d>1&&d<5)return b;if(d==1)return a;return c}
function haptic(t){
  if(!TG||!TG.HapticFeedback)return;
  try{
    if(t==='sel')TG.HapticFeedback.selectionChanged();
    else if(t==='light')TG.HapticFeedback.impactOccurred('light');
    else if(t==='mid')TG.HapticFeedback.impactOccurred('medium');
    else if(t==='ok')TG.HapticFeedback.notificationOccurred('success');
    else if(t==='err')TG.HapticFeedback.notificationOccurred('error');
    else if(t==='warn')TG.HapticFeedback.notificationOccurred('warning');
  }catch(e){}
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

// ── INIT ──
if (TG) { try { TG.ready(); TG.expand(); } catch(e){} }
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('page-add').classList.contains('active')) addWord();
  if (e.key === 'Tab' && document.getElementById('page-add').classList.contains('active')) {
    const t9 = document.querySelector('.t9');
    if (t9) { e.preventDefault(); t9.click(); }
  }
});
loadCloud(() => renderList());
</script>
