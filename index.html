<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WordFlip</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080f;--s1:#111118;--s2:#17171f;--s3:#1e1e28;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --a1:#6c63ff;--a2:#9f8fff;--a3:#c4b5fd;
  --green:#2dd4a0;--red:#ff6b7a;--amber:#fbbf24;
  --text:#eeeef5;--muted:#72728a;--muted2:#4a4a62;
  --r:16px;--r2:22px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text)}

.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-glow::before{content:'';position:absolute;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(108,99,255,.18) 0%,transparent 70%);animation:glowDrift 12s ease-in-out infinite alternate}
.bg-glow::after{content:'';position:absolute;bottom:-20%;right:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(159,143,255,.12) 0%,transparent 70%);animation:glowDrift 15s ease-in-out infinite alternate-reverse}
@keyframes glowDrift{0%{transform:translate(0,0)}100%{transform:translate(4%,5%)}}

.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:20px 16px 16px;display:none;flex-direction:column;gap:16px;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.active{display:flex}

/* NAV */
.nav{display:flex;background:rgba(17,17,24,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 8px 10px;gap:4px;position:relative;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px 6px;font-size:10px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .25s;border-radius:12px;letter-spacing:.01em;position:relative}
.nav-btn svg{width:20px;height:20px;stroke-width:2;transition:all .25s}
.nav-btn.active{color:var(--a3)}
.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(196,181,253,.5))}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--a1);opacity:0;transform:scale(0);transition:all .25s;position:absolute;bottom:6px}
.nav-btn.active .nav-dot{opacity:1;transform:scale(1)}

/* HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:4px}
.page-title{font-family:'Instrument Serif',serif;font-size:28px;font-style:italic;letter-spacing:-.01em;background:linear-gradient(135deg,var(--text) 30%,var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.count-badge{background:var(--s2);border:1px solid var(--border2);border-radius:30px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--a3)}

/* FORM */
.form-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(108,99,255,.5),transparent)}
.inp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;padding-left:2px}
.inp{width:100%;background:var(--s3);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:16px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;outline:none;transition:all .25s}
.inp:focus{border-color:var(--a1);background:rgba(108,99,255,.07);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.inp::placeholder{color:var(--muted2)}

/* SUGGESTIONS */
.suggest-box{display:flex;flex-direction:column;gap:8px}
.suggest-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding-left:2px}
.suggest-chips{display:flex;flex-wrap:wrap;gap:7px}
.s-chip{background:var(--s3);border:1.5px solid var(--border2);border-radius:30px;padding:8px 16px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap}
.s-chip:active,.s-chip.selected{background:rgba(108,99,255,.25);border-color:var(--a1);color:var(--a3);transform:scale(.97)}
.s-chip.selected{background:rgba(108,99,255,.3);border-color:var(--a2)}
.suggest-none{font-size:13px;color:var(--muted2);padding:4px 2px}

.selected-badge{display:flex;align-items:center;gap:8px;background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);border-radius:12px;padding:10px 14px}
.selected-badge .sb-label{font-size:11px;color:var(--muted);flex:1}
.selected-badge .sb-val{font-weight:700;font-size:15px;color:var(--a3)}
.selected-badge .sb-clear{background:none;border:none;color:var(--muted2);cursor:pointer;padding:2px;font-size:16px;line-height:1}

.btn-add{background:linear-gradient(135deg,var(--a1),#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;padding:14px;cursor:pointer;width:100%;transition:all .2s;letter-spacing:.01em;position:relative;overflow:hidden;opacity:.5;pointer-events:none}
.btn-add.ready{opacity:1;pointer-events:all}
.btn-add::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);pointer-events:none}
.btn-add:active{transform:scale(.97);opacity:.9}

/* WORD LIST */
.word-list{display:flex;flex-direction:column;gap:8px}
.word-item{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:10px;animation:fadeUp .3s cubic-bezier(.34,1.56,.64,1);transition:border-color .2s}
.word-item:hover{border-color:var(--border2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.word-num{font-size:11px;font-weight:700;color:var(--muted2);width:18px;flex-shrink:0}
.word-en{font-weight:700;font-size:15px;flex:1;letter-spacing:-.01em}
.word-arrow{color:var(--muted2);flex-shrink:0}
.word-ru{font-size:13px;color:var(--muted);flex:1;text-align:right}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted2);padding:4px;transition:color .2s;flex-shrink:0;border-radius:6px}
.del-btn:active{color:var(--red)}
.empty-state{text-align:center;color:var(--muted);font-size:14px;padding:50px 20px;line-height:2;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:40px;opacity:.5}

/* FLASHCARD */
.flash-progress{width:100%;display:flex;flex-direction:column;gap:6px}
.progress-track{width:100%;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--muted)}

.card-scene{width:100%;height:210px;perspective:1200px;cursor:pointer;user-select:none}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);-webkit-transition:-webkit-transform .6s cubic-bezier(.4,0,.2,1);will-change:transform}
.card-inner.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:28px;gap:8px;overflow:hidden;-webkit-transform:translateZ(0);transform:translateZ(0)}
.card-face.front{background:#1a1a28;border:1px solid var(--border2);z-index:2}
.card-face.front::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(108,99,255,.15),transparent 60%);pointer-events:none}
.card-face.back{background:#130f24;border:1px solid rgba(196,181,253,.2);-webkit-transform:rotateY(180deg) translateZ(0);transform:rotateY(180deg) translateZ(0);z-index:1}
.card-face.back::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 80%,rgba(159,143,255,.2),transparent 60%);pointer-events:none}
.card-chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;padding:3px 10px;position:relative;z-index:1}
.card-word{font-family:'Instrument Serif',serif;font-size:34px;font-style:italic;text-align:center;letter-spacing:-.01em;line-height:1.2;position:relative;z-index:1}
.card-face.back .card-word{background:linear-gradient(135deg,var(--a3),#e2d9fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-tap{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:4px;position:relative;z-index:1}

.card-btns{display:flex;gap:10px;width:100%}
.card-btn{flex:1;padding:15px 10px;border-radius:16px;border:1.5px solid var(--border);background:var(--s1);font-size:13px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.card-btn.know{border-color:rgba(45,212,160,.25);color:var(--green)}
.card-btn.know:active{background:rgba(45,212,160,.1);transform:scale(.96)}
.card-btn.skip{border-color:rgba(255,107,122,.25);color:var(--red)}
.card-btn.skip:active{background:rgba(255,107,122,.08);transform:scale(.96)}
.remind-strip{display:flex;gap:8px;width:100%}
.remind-pill{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:30px;color:var(--muted);font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;padding:9px 8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.remind-pill:active{background:rgba(108,99,255,.2);border-color:var(--a1);color:var(--a3);transform:scale(.97)}

/* QUIZ */
.quiz-wrap{display:flex;flex-direction:column;gap:14px}
.score-row{display:flex;gap:8px}
.score-chip{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.score-chip.g{border-color:rgba(45,212,160,.2);color:var(--green)}
.score-chip.r{border-color:rgba(255,107,122,.2);color:var(--red)}
.quiz-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:28px 20px 24px;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(108,99,255,.6),transparent)}
.quiz-sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.quiz-word{font-family:'Instrument Serif',serif;font-size:36px;font-style:italic;text-align:center;letter-spacing:-.02em;line-height:1.15;margin:4px 0}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;margin-top:4px}
.q-opt{background:var(--s2);border:1.5px solid var(--border);border-radius:14px;padding:14px 10px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);cursor:pointer;text-align:center;transition:all .2s;font-weight:600;line-height:1.35}
.q-opt:active{transform:scale(.97)}
.q-opt.correct{border-color:var(--green);background:rgba(45,212,160,.1);color:var(--green)}
.q-opt.wrong{border-color:var(--red);background:rgba(255,107,122,.08);color:var(--red)}
.q-fb{font-size:14px;font-weight:700;min-height:22px;text-align:center}
.q-fb.good{color:var(--green)}
.q-fb.bad{color:var(--red)}
.btn-next{background:linear-gradient(135deg,var(--a1),#8b5cf6);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;padding:14px 36px;cursor:pointer;transition:all .2s}
.btn-next:active{transform:scale(.97);opacity:.88}

/* RESULT */
.result-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 10px;text-align:center}
.result-emoji{font-size:64px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.result-title{font-family:'Instrument Serif',serif;font-size:28px;font-style:italic}
.result-sub{color:var(--muted);font-size:14px;line-height:1.8}
.result-stats{display:flex;gap:16px}
.r-stat{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:14px 20px}
.r-stat-num{font-family:'Instrument Serif',serif;font-size:32px;font-style:italic}
.r-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.r-stat.g .r-stat-num{color:var(--green)}
.r-stat.r .r-stat-num{color:var(--red)}

/* REMINDERS */
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 2px}
.rem-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.rem-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.rem-row:last-child{border-bottom:none}
.rem-info .rem-word{font-weight:700;font-size:14px}
.rem-info .rem-trans{font-size:12px;color:var(--muted);margin-top:1px}
.rem-right{display:flex;align-items:center;gap:8px}
.rem-badge{font-size:11px;font-weight:700;color:var(--a3);background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.2);border-radius:20px;padding:3px 9px}
.rem-del{background:none;border:none;cursor:pointer;color:var(--muted2);padding:4px;border-radius:6px;transition:color .2s}
.rem-del:active{color:var(--red)}
.rebtn{background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;padding:5px 9px;cursor:pointer;transition:all .2s}
.rebtn:active{background:rgba(108,99,255,.2);border-color:var(--a1);color:var(--a3)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(30,30,40,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:30px;padding:11px 22px;font-size:13px;font-weight:600;color:var(--text);opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.34,1.2,.64,1);z-index:999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.no-cards{text-align:center;color:var(--muted);font-size:14px;padding:50px 20px;line-height:2}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="app">
  <div class="pages">

    <!-- WORDS PAGE -->
    <div class="page active" id="page-add">
      <div class="page-header">
        <div class="page-title">WordFlip</div>
        <div class="count-badge" id="total-count">0 слов</div>
      </div>
      <div class="form-card">
        <div>
          <div class="inp-label">Слово</div>
          <input class="inp" id="inp-en" placeholder="Введи слово..." autocomplete="off" spellcheck="false" oninput="onWordInput(this.value)">
        </div>
        <div id="suggest-section" style="display:none">
          <div class="suggest-label">Выбери перевод</div>
          <div class="suggest-chips" id="suggest-chips"></div>
        </div>
        <div id="selected-section" style="display:none">
          <div class="selected-badge">
            <span class="sb-label">Выбрано:</span>
            <span class="sb-val" id="sb-val"></span>
            <button class="sb-clear" onclick="clearSelected()">×</button>
          </div>
        </div>
        <button class="btn-add" id="btn-add" onclick="addWord()">+ Добавить слово</button>
      </div>
      <div class="word-list" id="word-list"></div>
    </div>

    <!-- FLASHCARDS PAGE -->
    <div class="page" id="page-flash">
      <div class="page-header">
        <div class="page-title">Карточки</div>
        <div id="flash-counter" class="count-badge"></div>
      </div>
      <div id="flash-body"></div>
    </div>

    <!-- QUIZ PAGE -->
    <div class="page" id="page-quiz">
      <div class="page-header">
        <div class="page-title">Тест</div>
        <div class="score-row">
          <div class="score-chip g">✓ <span id="q-correct">0</span></div>
          <div class="score-chip r">✗ <span id="q-wrong">0</span></div>
        </div>
      </div>
      <div id="quiz-body"></div>
    </div>

    <!-- REMINDERS PAGE -->
    <div class="page" id="page-rem">
      <div class="page-header">
        <div class="page-title">Повторить</div>
      </div>
      <div id="rem-body"></div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="goPage('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Слова<span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="goPage('flash',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M8 12h8M8 15h5" stroke-linecap="round"/></svg>
      Карточки<span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="goPage('quiz',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round"/></svg>
      Тест<span class="nav-dot"></span>
    </button>
    <button class="nav-btn" onclick="goPage('rem',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke-linecap="round"/></svg>
      Напомнить<span class="nav-dot"></span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// BUILT-IN DICTIONARY (500+ common words)
// ══════════════════════════════════════════════════════

function lookupWord(w) {
  const key = w.trim().toLowerCase();
  // exact match
  if (DICT[key]) return DICT[key];
  // starts-with match
  const matches = Object.keys(DICT).filter(k => k.startsWith(key));
  if (matches.length) return DICT[matches[0]];
  return null;
}

// APP STATE
// ══════════════════════════════════════════════════════
let words = JSON.parse(localStorage.getItem('wf_words') || '[]');
let reminders = JSON.parse(localStorage.getItem('wf_rem') || '[]');
let flashIdx = 0, flashOrder = [];
let quizQ = null, quizAnswered = false, qCorrect = 0, qWrong = 0, quizQueue = [];
let selectedRu = '';

function save() {
  localStorage.setItem('wf_words', JSON.stringify(words));
  localStorage.setItem('wf_rem', JSON.stringify(reminders));
}

// ── NAV
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'flash') initFlash();
  if (id === 'quiz') initQuiz();
  if (id === 'rem') renderReminders();
  renderList();
}

// ── WORD INPUT + DICT LOOKUP
function onWordInput(val) {
  selectedRu = '';
  updateSelectedBadge();
  updateAddBtn();

  const sec = document.getElementById('suggest-section');
  const chips = document.getElementById('suggest-chips');

  if (!val.trim()) { sec.style.display = 'none'; return; }

  const results = lookupWord(val);
  if (results && results.length) {
    sec.style.display = 'block';
    chips.innerHTML = results.map(r =>
      `<div class="s-chip" onclick="pickTranslation('${esc(r)}')">${esc(r)}</div>`
    ).join('');
  } else {
    sec.style.display = 'block';
    chips.innerHTML = `<div class="suggest-none">Слово не найдено — введи перевод вручную</div>
      <input class="inp" id="inp-ru-manual" placeholder="Перевод..." autocomplete="off" style="margin-top:8px" oninput="onManualRu(this.value)">`;
  }
}

function onManualRu(val) {
  selectedRu = val.trim();
  updateAddBtn();
}

function pickTranslation(ru) {
  selectedRu = ru;
  // highlight chip
  document.querySelectorAll('.s-chip').forEach(c => {
    c.classList.toggle('selected', c.textContent === ru);
  });
  updateSelectedBadge();
  updateAddBtn();
  haptic('light');
}

function updateSelectedBadge() {
  const sel = document.getElementById('selected-section');
  const val = document.getElementById('sb-val');
  if (selectedRu) {
    sel.style.display = 'block';
    val.textContent = selectedRu;
  } else {
    sel.style.display = 'none';
  }
}

function clearSelected() {
  selectedRu = '';
  document.querySelectorAll('.s-chip').forEach(c => c.classList.remove('selected'));
  updateSelectedBadge();
  updateAddBtn();
}

function updateAddBtn() {
  const en = document.getElementById('inp-en').value.trim();
  const btn = document.getElementById('btn-add');
  btn.classList.toggle('ready', !!(en && selectedRu));
}

// ── WORDS
function addWord() {
  const en = document.getElementById('inp-en').value.trim();
  if (!en || !selectedRu) { showToast('⚠️ Выбери перевод'); return; }
  words.push({ id: Date.now(), en, ru: selectedRu });
  save();
  // reset form
  document.getElementById('inp-en').value = '';
  document.getElementById('suggest-section').style.display = 'none';
  document.getElementById('selected-section').style.display = 'none';
  selectedRu = '';
  updateAddBtn();
  renderList();
  showToast('✦ Добавлено: ' + en);
  haptic('light');
}

function deleteWord(id) {
  words = words.filter(w => w.id !== id);
  reminders = reminders.filter(r => r.wordId !== id);
  save(); renderList(); showToast('Удалено');
}

function renderList() {
  const list = document.getElementById('word-list');
  const count = document.getElementById('total-count');
  count.textContent = words.length + ' ' + plural(words.length, 'слово','слова','слов');
  if (!words.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div>Здесь появятся твои слова.<br>Добавь первое слово выше</div>`;
    return;
  }
  list.innerHTML = [...words].reverse().map((w, i) => `
    <div class="word-item">
      <div class="word-num">${words.length - i}</div>
      <div class="word-en">${esc(w.en)}</div>
      <div class="word-arrow"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
      <div class="word-ru">${esc(w.ru)}</div>
      <button class="del-btn" onclick="deleteWord(${w.id})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>`).join('');
}

// ── FLASHCARDS
function initFlash() {
  flashOrder = shuffle([...Array(words.length).keys()]);
  flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  const body = document.getElementById('flash-body');
  const counter = document.getElementById('flash-counter');
  if (!words.length) {
    counter.textContent = '';
    body.innerHTML = '<div class="no-cards">Сначала добавь слова<br>на вкладке «Слова» ✦</div>';
    return;
  }
  if (flashIdx >= flashOrder.length) {
    counter.textContent = '';
    body.innerHTML = `<div class="result-screen">
      <div class="result-emoji">🎉</div>
      <div class="result-title">Колода пройдена!</div>
      <div class="result-sub">Ты просмотрел все ${words.length} ${plural(words.length,'слово','слова','слов')}.</div>
      <button class="btn-next" onclick="initFlash()">↺ Начать заново</button>
    </div>`;
    return;
  }
  const w = words[flashOrder[flashIdx]];
  const prog = Math.round((flashIdx / flashOrder.length) * 100);
  counter.textContent = (flashIdx + 1) + ' / ' + flashOrder.length;
  body.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px;align-items:center">
      <div class="flash-progress" style="width:100%">
        <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
        <div class="progress-meta"><span>Прогресс</span><span>${prog}%</span></div>
      </div>
      <div class="card-scene" onclick="flipCard()">
        <div class="card-inner" id="card-inner">
          <div class="card-face front">
            <div class="card-chip">English</div>
            <div class="card-word">${esc(w.en)}</div>
            <div class="card-tap">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 10l5 5 5-5" stroke-linecap="round"/></svg>
              нажми, чтобы увидеть перевод
            </div>
          </div>
          <div class="card-face back">
            <div class="card-chip">Перевод</div>
            <div class="card-word">${esc(w.ru)}</div>
          </div>
        </div>
      </div>
      <div class="card-btns" style="width:100%">
        <button class="card-btn skip" onclick="flashNext(false)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          Не знаю
        </button>
        <button class="card-btn know" onclick="flashNext(true)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
          Знаю
        </button>
      </div>
      <div class="remind-strip" style="width:100%">
        <button class="remind-pill" onclick="addReminder(${w.id},'15')">⏰ +15 мин</button>
        <button class="remind-pill" onclick="addReminder(${w.id},'30')">⏰ +30 мин</button>
      </div>
    </div>`;
}

function flipCard() {
  const inner = document.getElementById('card-inner');
  if (inner) { inner.classList.toggle('flipped'); haptic('selection'); }
}
function flashNext(knew) {
  if (knew) showToast('✓ Отлично!');
  flashIdx++; renderFlash();
}

// ── QUIZ
function initQuiz() {
  qCorrect = 0; qWrong = 0;
  quizQueue = shuffle([...words]);
  updateQuizScore(); nextQuiz();
}
function nextQuiz() {
  const body = document.getElementById('quiz-body');
  if (!words.length) { body.innerHTML = '<div class="no-cards">Сначала добавь слова ✦</div>'; return; }
  if (words.length < 2) { body.innerHTML = '<div class="no-cards">Добавь хотя бы 2 слова для теста</div>'; return; }
  if (!quizQueue.length) {
    body.innerHTML = `<div class="result-screen">
      <div class="result-emoji">${qCorrect >= qWrong ? '🏆' : '📚'}</div>
      <div class="result-title">${qCorrect >= qWrong ? 'Отличный результат!' : 'Нужно повторить!'}</div>
      <div class="result-stats">
        <div class="r-stat g"><div class="r-stat-num">${qCorrect}</div><div class="r-stat-lbl">Верно</div></div>
        <div class="r-stat r"><div class="r-stat-num">${qWrong}</div><div class="r-stat-lbl">Ошибок</div></div>
      </div>
      <button class="btn-next" onclick="initQuiz()">↺ Пройти снова</button>
    </div>`;
    return;
  }
  quizAnswered = false;
  quizQ = quizQueue.pop();
  const others = words.filter(w => w.id !== quizQ.id);
  const opts = shuffle([quizQ, ...shuffle(others).slice(0, Math.min(3, others.length))]);
  body.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-card">
        <div class="quiz-sub">Переведи слово</div>
        <div class="quiz-word">${esc(quizQ.en)}</div>
      </div>
      <div class="quiz-opts" id="quiz-opts">
        ${opts.map(o => `<button class="q-opt" onclick="checkAnswer(this,${o.id})">${esc(o.ru)}</button>`).join('')}
      </div>
      <div class="q-fb" id="q-fb"></div>
      <div style="display:flex;justify-content:center">
        <button class="btn-next" id="q-next-btn" style="display:none" onclick="nextQuiz()">Следующее →</button>
      </div>
    </div>`;
}
function checkAnswer(btn, id) {
  if (quizAnswered) return;
  quizAnswered = true;
  const correct = id === quizQ.id;
  document.querySelectorAll('.q-opt').forEach(b => b.style.pointerEvents = 'none');
  const fb = document.getElementById('q-fb');
  if (correct) {
    btn.classList.add('correct'); fb.textContent = '✓ Правильно!'; fb.className = 'q-fb good';
    qCorrect++; haptic('success');
  } else {
    btn.classList.add('wrong'); fb.textContent = '✗ Правильный: ' + quizQ.ru; fb.className = 'q-fb bad';
    qWrong++;
    document.querySelectorAll('.q-opt').forEach(b => {
      if (parseInt(b.getAttribute('onclick').match(/\d+/)[0]) === quizQ.id) b.classList.add('correct');
    });
    haptic('error');
  }
  updateQuizScore();
  document.getElementById('q-next-btn').style.display = 'block';
}
function updateQuizScore() {
  document.getElementById('q-correct').textContent = qCorrect;
  document.getElementById('q-wrong').textContent = qWrong;
}

// ── REMINDERS
function addReminder(wordId, mins) {
  const w = words.find(x => x.id === wordId);
  if (!w) return;
  const fireAt = Date.now() + parseInt(mins) * 60000;
  reminders = reminders.filter(r => r.wordId !== wordId);
  reminders.push({ wordId, en: w.en, ru: w.ru, fireAt, mins, notified: false });
  save(); showToast(`⏰ Напомнит через ${mins} мин`); haptic('medium');
}
function renderReminders() {
  const body = document.getElementById('rem-body');
  const now = Date.now();
  const active = reminders.filter(r => r.fireAt > now).sort((a,b) => a.fireAt - b.fireAt);
  const fired = reminders.filter(r => r.fireAt <= now);
  if (!active.length && !fired.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⏰</div>Нет напоминаний.<br>Установи их на вкладке «Карточки»</div>`;
    return;
  }
  let html = '';
  if (fired.length) {
    html += `<div class="sec-label">🔔 Пора повторить</div><div class="rem-card">`;
    fired.forEach(r => {
      html += `<div class="rem-row">
        <div class="rem-info"><div class="rem-word">${esc(r.en)}</div><div class="rem-trans">${esc(r.ru)}</div></div>
        <div class="rem-right">
          <button class="rebtn" onclick="addReminder(${r.wordId},'15')">+15м</button>
          <button class="rebtn" onclick="addReminder(${r.wordId},'30')">+30м</button>
          <button class="rem-del" onclick="deleteReminder(${r.wordId})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  if (active.length) {
    if (fired.length) html += '<div style="height:8px"></div>';
    html += `<div class="sec-label">⏳ Запланировано</div><div class="rem-card">`;
    active.forEach(r => {
      const mLeft = Math.ceil((r.fireAt - now) / 60000);
      html += `<div class="rem-row">
        <div class="rem-info"><div class="rem-word">${esc(r.en)}</div><div class="rem-trans">${esc(r.ru)}</div></div>
        <div class="rem-right">
          <div class="rem-badge">через ${mLeft} мин</div>
          <button class="rem-del" onclick="deleteReminder(${r.wordId})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  body.innerHTML = html;
}
function deleteReminder(wordId) {
  reminders = reminders.filter(r => r.wordId !== wordId);
  save(); renderReminders();
}
setInterval(() => {
  const now = Date.now();
  const fired = reminders.filter(r => r.fireAt <= now && !r.notified);
  fired.forEach(r => { r.notified = true; showToast('🔔 Повтори: ' + r.en); haptic('warning'); });
  if (fired.length) { save(); renderReminders(); }
}, 10000);

// ── UTILS
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}
function plural(n,f1,f2,f5){n=Math.abs(n)%100;const n1=n%10;if(n>10&&n<20)return f5;if(n1>1&&n1<5)return f2;if(n1==1)return f1;return f5}
function haptic(t){if(window.Telegram&&Telegram.WebApp){if(t==='selection')Telegram.WebApp.HapticFeedback.selectionChanged();else if(t==='light'||t==='medium')Telegram.WebApp.HapticFeedback.impactOccurred(t);else Telegram.WebApp.HapticFeedback.notificationOccurred(t);}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}

// ── INIT
if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
if (!words.length) {
  words = [
    { id: 1, en: 'Resilience', ru: 'Устойчивость' },
    { id: 2, en: 'Ambiguous', ru: 'Неоднозначный' },
    { id: 3, en: 'Serendipity', ru: 'Счастливая случайность' },
  ];
  save();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('page-add').classList.contains('active')) addWord();
});
renderList();
</script>
